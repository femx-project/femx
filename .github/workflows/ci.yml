name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/build/install-prefix"

      - name: Build
        run: cmake --build build --parallel

      - name: Unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Install test
        run: cmake --build build --target test_install --parallel
