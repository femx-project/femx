name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/build/install-prefix"

      - name: Build
        run: cmake --build build --parallel

      - name: Unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Install test
        run: cmake --build build --target test_install --parallel

  python:
    name: Python API
    runs-on: ubuntu-latest

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-openmpi-dev libpetsc-real-dev pkg-config

      - name: Install package
        run: python -m pip install ".[test]"

      - name: Python tests
        run: python -m unittest discover -s python/tests -v
